services:
  cache-quantum:
    image: redis:alpine
    container_name: quantum_redis
    ports:
      - "6379:6379"
    restart: always

  db-quantum:
    image: mysql:8.0
    container_name: quantum_mysql
    restart: always
    command: --innodb_flush_method=nosync
    environment:
      MYSQL_DATABASE: quantumbanking_db
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost" ]
      timeout: 5s
      retries: 5

volumes:
  mysql_data: