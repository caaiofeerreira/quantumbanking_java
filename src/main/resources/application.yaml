spring:
  jackson:
    mapper:
      accept-case-insensitive-enums: true
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: JDBC:mysql://${LOCAL_HOST}/${DB}
    username: root
    password: ${SPRING_DATASOURCE_PASSWORD}
  jpa:
    show-sql: true
    properties:
      hibernate:
        format_sql: true

server:
  error:
    include-stacktrace: never

api:
  security:
    token:
      secret: ${JWT_SECRET}

bank:
  code: ${ADMIN_BANK_CODE:001}
  name: ${ADMIN_BANK_NAME:Quantum Banking S.A.}

admin:
  cpf: ${ADMIN_CPF:000.000.000-00}
  password: ${ADMIN_PASSWORD:root123}
  name: ${ADMIN_NAME:Admin}
  phone: ${ADMIN_PHONE:4004-0042}
  email: ${ADMIN_EMAIL:admin@quantumbank.com.br}